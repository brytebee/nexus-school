name: Build Linux Installers

on:
  workflow_dispatch:          # run manually from GitHub Actions tab
  push:
    tags:
      - 'v*'                  # auto-trigger on version tags like v1.0.2

jobs:
  build-linux:
    name: Build .deb + AppImage (native Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: public_shell/electron/package-lock.json

      - name: Install system dependencies (canvas / puppeteer)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1
          sudo apt-get install -y libasound2 || sudo apt-get install -y libasound2t64

      - name: Install npm dependencies
        run: npm install
        working-directory: public_shell/electron

      - name: Run tests
        run: npm test
        working-directory: public_shell/electron

      - name: Build Linux packages (.deb + AppImage)
        run: npm run dist:linux:native
        working-directory: public_shell/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusschoolos-deb
          path: public_shell/electron/release/*.deb
          retention-days: 30

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusschoolos-appimage
          path: public_shell/electron/release/*.AppImage
          retention-days: 30
