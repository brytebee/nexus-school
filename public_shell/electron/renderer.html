<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://fonts.googleapis.com https://fonts.gstatic.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus School OS (React)</title>
    <!-- Import existing variables to maintain design consistency without duplicating CSS -->
    <link rel="stylesheet" href="./css/variables.css" />

    <style>
      body {
        margin: 0;
        background-color: #0A0E2E; /* var(--bg) */

    <script type="module" src="/src/main.tsx"></script>
