<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Receipt Print Hub</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #333;
      background-color: #fff;
      -webkit-print-color-adjust: exact;
    }
    
    /* Layout A4 styling */
    .receipt-container.format-a4 {
      width: 210mm;
      min-height: 297mm;
      padding: 20mm;
      box-sizing: border-box;
    }
    .format-a4 .header {
      border-bottom: 2px solid #b8860b;
      padding-bottom: 15px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .format-a4 .school-logo {
      max-width: 80px;
      max-height: 80px;
      margin-right: 15px;
    }
    .format-a4 .school-info {
      flex: 1;
    }
    .format-a4 .school-name {
      font-size: 24px;
      font-weight: bold;
      color: #0f172a;
      margin: 0 0 5px 0;
    }
    .format-a4 .school-details {
      font-size: 11px;
      color: #475569;
      margin: 0;
      line-height: 1.4;
    }
    .format-a4 .receipt-title {
      background-color: #0f172a;
      color: #fff;
      padding: 8px 15px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .format-a4 .meta-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }
    .format-a4 .meta-title {
      font-size: 11px;
      font-weight: bold;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .format-a4 .meta-content {
      font-size: 12px;
      color: #334155;
      line-height: 1.5;
    }
    .format-a4 .meta-content strong {
      color: #0f172a;
    }
    .format-a4 .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    .format-a4 .data-table th {
      background-color: #f8fafc;
      border-bottom: 2px solid #e2e8f0;
      color: #475569;
      font-weight: bold;
      font-size: 11px;
      padding: 10px;
      text-align: left;
    }
    .format-a4 .data-table td {
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 10px;
      font-size: 12px;
      color: #0f172a;
    }
    .format-a4 .total-block {
      float: right;
      width: 250px;
      background-color: #0f172a;
      color: #fff;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .format-a4 .total-label {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .format-a4 .total-val {
      font-size: 18px;
      font-weight: bold;
    }
    .format-a4 .footer {
      clear: both;
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      text-align: center;
      font-size: 10px;
      color: #64748b;
      line-height: 1.5;
    }

    /* Layout Thermal 80mm styling */
    .receipt-container.format-thermal {
      width: 76mm;
      padding: 4mm;
      box-sizing: border-box;
      font-size: 11px;
      line-height: 1.4;
    }
    .format-thermal .header {
      text-align: center;
      margin-bottom: 15px;
      border-bottom: 1px dashed #000;
      padding-bottom: 10px;
    }
    .format-thermal .school-logo {
      display: none;
    }
    .format-thermal .school-name {
      font-size: 14px;
      font-weight: bold;
      margin: 0 0 4px 0;
      text-transform: uppercase;
    }
    .format-thermal .school-details {
      font-size: 9px;
      color: #000;
      margin: 0;
    }
    .format-thermal .receipt-title {
      text-align: center;
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 10px;
      text-decoration: underline;
    }
    .format-thermal .meta-section {
      margin-bottom: 10px;
      border-bottom: 1px dashed #000;
      padding-bottom: 8px;
    }
    .format-thermal .meta-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      font-size: 10px;
    }
    .format-thermal .meta-title {
      font-weight: bold;
    }
    .format-thermal .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    .format-thermal .data-table th {
      border-bottom: 1px solid #000;
      text-align: left;
      font-size: 9px;
      padding: 4px 0;
    }
    .format-thermal .data-table td {
      padding: 6px 0;
      font-size: 10px;
    }
    .format-thermal .total-block {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 6px 0;
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 15px;
    }
    .format-thermal .footer {
      text-align: center;
      font-size: 9px;
      line-height: 1.3;
      margin-top: 10px;
    }

    /* Print settings */
    @media print {
      body {
        background-color: transparent;
      }
      .format-a4 {
        width: 100%;
        min-height: 0;
        padding: 0;
      }
      .format-thermal {
        width: 100%;
        padding: 0;
      }
    }
  </style>
</head>
<body>

  <div id="receipt-container" class="receipt-container format-a4">
    <div class="header">
      <img id="logo-img" class="school-logo" src="" style="display: none;" alt="School Logo">
      <div class="school-info">
        <h1 id="school-name" class="school-name">School Name</h1>
        <p id="school-details" class="school-details">Address & Contact Information</p>
      </div>
    </div>

    <div class="receipt-title">OFFICIAL PAYMENT RECEIPT</div>

    <!-- Meta Info -->
    <div id="meta-container">
      <!-- Generated dynamically based on format -->
    </div>

    <!-- Allocation Table -->
    <table class="data-table">
      <thead>
        <tr id="table-headers">
          <!-- Generated dynamically based on format -->
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Rows populated dynamically -->
      </tbody>
    </table>

    <!-- Total Paid Block -->
    <div class="total-block">
      <span class="total-label">TOTAL PAID</span>
      <span id="total-val" class="total-val">₦0</span>
    </div>

    <div class="footer">
      <p id="footer-text">This is an official transaction receipt generated by Nexus School OS.<br>Thank you for your payment.</p>
    </div>
  </div>

  <script>
    // Handle data receiving from Electron main process
    const { ipcRenderer } = require('electron');

    ipcRenderer.on('print:load-data', (event, { data, format }) => {
      // Set overall format class
      const container = document.getElementById('receipt-container');
      container.className = `receipt-container format-${format}`;

      // Populate school branding
      document.getElementById('school-name').textContent = data.schoolName || 'The School';
      document.getElementById('school-details').innerHTML = `
        ${data.schoolAddress || 'Address'}<br>
        Phone: ${data.schoolPhone || '—'}
      `;

      if (data.schoolLogoB64 && format === 'a4') {
        const logo = document.getElementById('logo-img');
        const hasPrefix = data.schoolLogoB64.startsWith('data:');
        logo.src = hasPrefix ? data.schoolLogoB64 : `data:image/png;base64,${data.schoolLogoB64}`;
        logo.style.display = 'block';
      }

      // Populate total
      document.getElementById('total-val').textContent = '₦' + Number(data.amountPaid).toLocaleString('en-NG');

      // Populate meta fields based on format structure
      const metaContainer = document.getElementById('meta-container');
      if (format === 'a4') {
        metaContainer.className = 'meta-section';
        metaContainer.innerHTML = `
          <div>
            <div class="meta-title">Bill To:</div>
            <div class="meta-content">
              <strong>${data.studentName}</strong><br>
              Class: ${data.studentClass}<br>
              Session: ${data.academicSession} · Term: ${data.term}<br>
              Email: ${data.parentEmail || '—'}
            </div>
          </div>
          <div>
            <div class="meta-title">Transaction Details:</div>
            <div class="meta-content">
              Reference: <strong>${data.reference}</strong><br>
              Date Paid: ${data.paymentDate || '—'}<br>
              Method: ${data.paymentMethod}
            </div>
          </div>
        `;

        // Table headers for A4
        document.getElementById('table-headers').innerHTML = `
          <th>Student / Item Allocation</th>
          <th style="text-align: right; width: 120px;">Allocated (₦)</th>
          <th style="text-align: right; width: 140px;">Remaining Balance (₦)</th>
        `;
      } else {
        // Thermal
        metaContainer.className = 'meta-section';
        metaContainer.innerHTML = `
          <div class="meta-item"><span class="meta-title">Student:</span><span>${data.studentName}</span></div>
          <div class="meta-item"><span class="meta-title">Class:</span><span>${data.studentClass}</span></div>
          <div class="meta-item"><span class="meta-title">Email:</span><span>${data.parentEmail || '—'}</span></div>
          <div class="meta-item"><span class="meta-title">Term:</span><span>${data.term} (${data.academicSession})</span></div>
          <div class="meta-item"><span class="meta-title">Ref:</span><span>${data.reference}</span></div>
          <div class="meta-item"><span class="meta-title">Date:</span><span>${data.paymentDate || '—'}</span></div>
          <div class="meta-item"><span class="meta-title">Method:</span><span>${data.paymentMethod}</span></div>
        `;

        // Table headers for Thermal
        document.getElementById('table-headers').innerHTML = `
          <th>Allocation</th>
          <th style="text-align: right;">Amount</th>
          <th style="text-align: right;">Balance</th>
        `;
      }

      // Populate allocations
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      data.allocations.forEach(alloc => {
        const tr = document.createElement('tr');
        if (format === 'a4') {
          tr.innerHTML = `
            <td>${alloc.name}</td>
            <td style="text-align: right; font-weight: bold;">₦${Number(alloc.amount).toLocaleString('en-NG')}</td>
            <td style="text-align: right;">₦${Number(alloc.balance).toLocaleString('en-NG')}</td>
          `;
        } else {
          tr.innerHTML = `
            <td>${alloc.name}</td>
            <td style="text-align: right; font-weight: bold;">₦${Number(alloc.amount).toLocaleString('en-NG')}</td>
            <td style="text-align: right;">₦${Number(alloc.balance).toLocaleString('en-NG')}</td>
          `;
        }
        tbody.appendChild(tr);
      });

      // Let Electron know we are populated and ready to trigger print
      ipcRenderer.send('print:ready-to-print');
    });
  </script>
</body>
</html>
